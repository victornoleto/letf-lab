<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>html,body{margin:0;padding:0;width:1920px;height:1120px;overflow:hidden;}#root{width:1920px;height:1120px;overflow:hidden;}</style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="ui-shared.jsx"></script>
<script type="text/babel" src="charts.jsx"></script>
<script type="text/babel" src="capture-shell.jsx"></script>
<script type="text/babel" src="var-a-linear.jsx"></script>
<script type="text/babel" src="linear-extras.jsx"></script>
<script type="text/babel" data-presets="env,react">
  // Wait for all dependent scripts to populate window globals
  function ready() { return window.AISWING_CAPTURE && window.AISWING_VARS && window.AISWING_VARS.A_SCREENS && window.AISWING_EXTRAS; }
  function go() {
    if (!ready()) { return setTimeout(go, 30); }
    init();
  }
  function init() {
  const params = new URLSearchParams(location.hash.slice(1));
  const screenId = params.get('s') || 'dashboard';
  const themeId = params.get('t') || 'light';
  const { TOKENS_LIGHT, TOKENS_DARK, Shell } = window.AISWING_CAPTURE;
  const S = window.AISWING_VARS.A_SCREENS;
  const X = window.AISWING_EXTRAS;
  const t = themeId === 'dark' ? TOKENS_DARK : TOKENS_LIGHT;
  const sr = () => {};
  document.body.style.background = t.bg;
  const MAP = {
    'dashboard':         () => <Shell tokens={t} route={{name:'dashboard'}} setRoute={sr}><S.DashA tokens={t} setRoute={sr} bannerDismissed={false} setBannerDismissed={()=>{}} /></Shell>,
    'strategy-list':     () => <Shell tokens={t} route={{name:'strategies'}} setRoute={sr}><S.StratListA tokens={t} setRoute={sr} /></Shell>,
    'strategy-detail':   () => <Shell tokens={t} route={{name:'strategy-detail'}} setRoute={sr}><S.DetailA tokens={t} stratId={1} setRoute={sr} /></Shell>,
    'strategy-form':     () => <Shell tokens={t} route={{name:'strategies'}} setRoute={sr}><S.StratFormA tokens={t} editing={1} setRoute={sr} /></Shell>,
    'indicator-list':    () => <Shell tokens={t} route={{name:'indicators'}} setRoute={sr}><S.IndListA tokens={t} setRoute={sr} /></Shell>,
    'indicator-form':    () => <Shell tokens={t} route={{name:'indicators'}} setRoute={sr}><S.IndFormA tokens={t} editing={4} setRoute={sr} /></Shell>,
    'settings':          () => <Shell tokens={t} route={{name:'settings'}} setRoute={sr}><X.SettingsScreen tokens={t} /></Shell>,
    'sidebar-collapsed': () => <Shell tokens={t} collapsed={true} route={{name:'dashboard'}} setRoute={sr}><S.DashA tokens={t} setRoute={sr} bannerDismissed={true} setBannerDismissed={()=>{}} /></Shell>,
    'empty':             () => <Shell tokens={t} route={{name:'strategies'}} setRoute={sr}><X.EmptyStateBlock tokens={t} /></Shell>,
    'loading':           () => <Shell tokens={t} route={{name:'dashboard'}} setRoute={sr}><X.LoadingStateBlock tokens={t} /></Shell>,
    'modal':             () => <><Shell tokens={t} route={{name:'strategies'}} setRoute={sr}><S.StratListA tokens={t} setRoute={sr} /></Shell><X.ModalOverlay tokens={t} /></>,
    'palette':           () => <><Shell tokens={t} route={{name:'dashboard'}} setRoute={sr}><S.DashA tokens={t} setRoute={sr} bannerDismissed={true} setBannerDismissed={()=>{}} /></Shell><X.CommandPaletteOverlay tokens={t} /></>,
    'toast':             () => <><Shell tokens={t} route={{name:'dashboard'}} setRoute={sr}><S.DashA tokens={t} setRoute={sr} bannerDismissed={true} setBannerDismissed={()=>{}} /></Shell><X.ToastStack tokens={t} /></>,
    'login':             () => <X.LoginScreen tokens={t} />,
    'notfound':          () => <X.NotFoundScreen tokens={t} setRoute={sr} />,
  };
  const node = (MAP[screenId] || MAP['dashboard'])();
  ReactDOM.createRoot(document.getElementById('root')).render(node);
  }
  go();
</script>
</body>
</html>
